name: Update DSO Dashboard

on:
  schedule:
    - cron: '0 5,7,9,11,13,15 * * 1-5'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Generate dashboard data
        env:
          MONEYBIRD_TOKEN: ${{ secrets.MONEYBIRD_TOKEN }}
          MONEYBIRD_ADMIN_ID: ${{ secrets.MONEYBIRD_ADMIN_ID }}
        run: python generate_dashboard.py

      - name: Push naar GitHub Pages
        run: |
          git config user.name  "DSO Bot"
          git config user.email "dso-bot@users.noreply.github.com"
          git add docs/data.json docs/history.json
          git diff --staged --quiet && echo "Geen wijzigingen" || git commit -m "chore: DSO sync $(date +'%Y-%m-%d %H:%M')"
          git push
