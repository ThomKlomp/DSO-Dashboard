<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DSO Dashboard</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@300;400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:       #f5f4f0;
  --surface:  #ffffff;
  --border:   #e2e0d9;
  --text:     #1a1916;
  --muted:    #7a7870;
  --accent:   #2563eb;
  --red:      #dc2626;
  --orange:   #ea580c;
  --amber:    #d97706;
  --green:    #16a34a;
  --ink:      #1a1916;
  --serif:    'IBM Plex Sans', sans-serif;
  --mono:     'IBM Plex Mono', monospace;
}

body {
  font-family: var(--serif);
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
}

/* ── TOP BAR ── */
.topbar {
  background: var(--ink);
  color: #fff;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 32px;
  height: 52px;
  position: sticky; top: 0; z-index: 100;
}

.topbar-left {
  display: flex; align-items: center; gap: 16px;
}

.topbar h1 {
  font-size: 14px; font-weight: 600; letter-spacing: 0.5px;
}

.topbar-tag {
  font-family: var(--mono);
  font-size: 11px;
  background: rgba(255,255,255,0.1);
  padding: 3px 10px;
  border-radius: 3px;
  color: rgba(255,255,255,0.6);
}

.topbar-right {
  display: flex; align-items: center; gap: 12px;
}

#sync-time {
  font-family: var(--mono);
  font-size: 11px;
  color: rgba(255,255,255,0.5);
}

.status-dot {
  width: 7px; height: 7px;
  border-radius: 50%;
  background: #22c55e;
  animation: pulse 2s infinite;
}

@keyframes pulse {
  0%,100% { opacity: 1; }
  50%      { opacity: 0.4; }
}

/* ── LAYOUT ── */
.page { max-width: 1200px; margin: 0 auto; padding: 32px 24px; }

/* ── KPI ROW ── */
.kpi-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
  gap: 2px;
  margin-bottom: 32px;
  border: 2px solid var(--ink);
  border-radius: 4px;
  overflow: hidden;
}

.kpi {
  background: var(--surface);
  padding: 24px 20px;
  border-right: 1px solid var(--border);
  position: relative;
  transition: background 0.15s;
}
.kpi:last-child { border-right: none; }
.kpi:hover { background: #fafaf8; }

.kpi-label {
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  color: var(--muted);
  margin-bottom: 10px;
}

.kpi-value {
  font-size: 32px;
  font-weight: 700;
  line-height: 1;
  font-variant-numeric: tabular-nums;
}

.kpi-sub {
  font-size: 12px;
  color: var(--muted);
  margin-top: 6px;
  font-family: var(--mono);
}

.kpi-badge {
  position: absolute; top: 16px; right: 16px;
  font-size: 10px; font-weight: 700;
  letter-spacing: 0.5px;
  padding: 3px 8px; border-radius: 2px;
}

.badge-good   { background: #dcfce7; color: var(--green); }
.badge-warn   { background: #fef9c3; color: var(--amber); }
.badge-urgent { background: #fee2e2; color: var(--red);   }

/* ── TWO-COL ── */
.grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px; }
.grid-3 { display: grid; grid-template-columns: 2fr 1fr; gap: 20px; margin-bottom: 20px; }

@media (max-width: 768px) {
  .grid-2, .grid-3 { grid-template-columns: 1fr; }
}

/* ── CARD ── */
.card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 4px;
  overflow: hidden;
}

.card-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 14px 20px;
  border-bottom: 1px solid var(--border);
  background: #fafaf8;
}

.card-title {
  font-size: 12px;
  font-weight: 700;
  letter-spacing: 1px;
  text-transform: uppercase;
  color: var(--muted);
}

.card-body { padding: 20px; }
.chart-wrap { position: relative; height: 220px; }

/* ── AGING BARS ── */
.aging-row {
  display: flex; align-items: center; gap: 12px;
  padding: 10px 0;
  border-bottom: 1px solid var(--border);
}
.aging-row:last-child { border-bottom: none; }

.aging-label {
  font-family: var(--mono); font-size: 12px;
  width: 90px; flex-shrink: 0; color: var(--muted);
}

.aging-bar-wrap { flex: 1; background: var(--border); border-radius: 2px; height: 8px; overflow: hidden; }
.aging-bar      { height: 100%; border-radius: 2px; transition: width 1s ease; }

.aging-amount {
  font-family: var(--mono); font-size: 12px; font-weight: 500;
  width: 90px; text-align: right; flex-shrink: 0;
}

.aging-pct {
  font-family: var(--mono); font-size: 11px; color: var(--muted);
  width: 36px; text-align: right; flex-shrink: 0;
}

/* ── TABLE ── */
.data-table { width: 100%; border-collapse: collapse; font-size: 13px; }
.data-table th {
  text-align: left; padding: 10px 14px;
  font-size: 10px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase;
  color: var(--muted); border-bottom: 2px solid var(--border);
  background: #fafaf8; white-space: nowrap;
}
.data-table td {
  padding: 10px 14px; border-bottom: 1px solid var(--border);
  color: var(--text); vertical-align: middle;
}
.data-table tr:last-child td { border-bottom: none; }
.data-table tr:hover td { background: #fafaf8; }

.data-table td.mono { font-family: var(--mono); font-size: 12px; }
.data-table td.amount { font-family: var(--mono); font-weight: 600; }

.pill {
  display: inline-block; padding: 2px 8px; border-radius: 2px;
  font-size: 10px; font-weight: 700; letter-spacing: 0.5px; white-space: nowrap;
}
.pill-urgent { background: #fee2e2; color: var(--red); }
.pill-high   { background: #ffedd5; color: var(--orange); }
.pill-ok     { background: #fef9c3; color: var(--amber); }

.days-chip {
  display: inline-block;
  font-family: var(--mono); font-size: 11px; font-weight: 600;
  padding: 2px 7px; border-radius: 2px;
}
.days-0   { background: #f0fdf4; color: var(--green); }
.days-30  { background: #fef9c3; color: var(--amber); }
.days-60  { background: #ffedd5; color: var(--orange); }
.days-90  { background: #fee2e2; color: var(--red); }

/* ── LOADING / ERROR ── */
#loading {
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  height: 80vh; gap: 16px;
}

.spinner {
  width: 32px; height: 32px;
  border: 3px solid var(--border);
  border-top-color: var(--ink);
  border-radius: 50%;
  animation: spin 0.7s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

#error-msg {
  display: none;
  background: #fee2e2; border: 1px solid #fca5a5;
  color: var(--red); padding: 16px 24px; border-radius: 4px;
  font-size: 14px; margin: 32px auto; max-width: 480px;
}

#dashboard { display: none; }

/* ── FOOTER ── */
footer {
  text-align: center; padding: 32px;
  font-family: var(--mono); font-size: 11px; color: var(--muted);
}
</style>
</head>
<body>

<div class="topbar">
  <div class="topbar-left">
    <h1>DSO DASHBOARD</h1>
    <span class="topbar-tag">Credit Management</span>
  </div>
  <div class="topbar-right">
    <div class="status-dot"></div>
    <span id="sync-time">Loading…</span>
  </div>
</div>

<div id="loading">
  <div class="spinner"></div>
  <span style="font-size:13px;color:var(--muted)">Loading dashboard data…</span>
</div>

<div id="error-msg"></div>

<div id="dashboard">
<div class="page">

  <!-- KPIs -->
  <div class="kpi-grid" id="kpi-grid"></div>

  <!-- ROW 1: DSO trend + Aging bars -->
  <div class="grid-3">
    <div class="card">
      <div class="card-header">
        <span class="card-title">DSO Trend (90 days)</span>
      </div>
      <div class="card-body">
        <div class="chart-wrap"><canvas id="dsoChart"></canvas></div>
      </div>
    </div>
    <div class="card">
      <div class="card-header">
        <span class="card-title">AR Aging</span>
      </div>
      <div class="card-body" id="aging-bars"></div>
    </div>
  </div>

  <!-- ROW 2: Overdue by customer + Priority donut -->
  <div class="grid-2">
    <div class="card">
      <div class="card-header">
        <span class="card-title">Top Overdue Customers</span>
      </div>
      <div class="card-body">
        <div class="chart-wrap"><canvas id="customerChart"></canvas></div>
      </div>
    </div>
    <div class="card">
      <div class="card-header">
        <span class="card-title">Priority Distribution</span>
      </div>
      <div class="card-body">
        <div class="chart-wrap"><canvas id="priorityChart"></canvas></div>
      </div>
    </div>
  </div>

  <!-- ROW 3: Overdue table -->
  <div class="card">
    <div class="card-header">
      <span class="card-title">Overdue Invoices — Priority Order</span>
      <span id="overdue-count" style="font-family:var(--mono);font-size:11px;color:var(--muted)"></span>
    </div>
    <div style="overflow-x:auto">
      <table class="data-table">
        <thead>
          <tr>
            <th>#</th>
            <th>Customer</th>
            <th>Invoice</th>
            <th>Due Date</th>
            <th>Amount (€)</th>
            <th>Days Overdue</th>
            <th>Priority</th>
          </tr>
        </thead>
        <tbody id="overdue-tbody"></tbody>
      </table>
    </div>
  </div>

</div>
</div>

<footer id="footer"></footer>

<script>
const fmt  = n => new Intl.NumberFormat('nl-NL', {minimumFractionDigits:0, maximumFractionDigits:0}).format(n);
const fmtE = n => '€' + fmt(n);
const fmtD = n => n.toFixed(1);

const AGING_COLORS = {
  'Current':    '#16a34a',
  '1-30 days':  '#ca8a04',
  '31-60 days': '#ea580c',
  '61-90 days': '#dc2626',
  '>90 days':   '#7f1d1d',
};

async function load() {
  try {
    const r = await fetch('data.json?t=' + Date.now());
    if (!r.ok) throw new Error(`HTTP ${r.status}`);
    const d = await r.json();
    render(d);
  } catch(e) {
    document.getElementById('loading').style.display = 'none';
    const err = document.getElementById('error-msg');
    err.style.display = 'block';
    err.textContent = '⚠️ Could not load dashboard data. Run the Python script to generate data.json. (' + e.message + ')';
  }
}

function render(d) {
  document.getElementById('loading').style.display = 'none';
  document.getElementById('dashboard').style.display = 'block';

  const ts = new Date(d.generated);
  document.getElementById('sync-time').textContent =
    'Updated ' + ts.toLocaleDateString('nl-NL') + ' ' + ts.toLocaleTimeString('nl-NL',{hour:'2-digit',minute:'2-digit'});

  renderKPIs(d);
  renderAgingBars(d);
  renderDSOChart(d);
  renderCustomerChart(d);
  renderPriorityChart(d);
  renderTable(d);

  document.getElementById('footer').textContent =
    'Last sync: ' + new Date(d.generated).toISOString() + ' · ' + d.invoice_count + ' invoices tracked';
}

function renderKPIs(d) {
  const dsoOk    = d.dso <= d.dso_target;
  const dsoClose = d.dso <= d.dso_target * 1.15;
  const dsoBadge = dsoOk ? 'badge-good' : (dsoClose ? 'badge-warn' : 'badge-urgent');
  const dsoLabel = dsoOk ? 'ON TARGET' : (dsoClose ? 'WATCH' : 'ACTION');

  const items = [
    { label: 'DSO (days)', value: fmtD(d.dso),
      sub: `Target: ${d.dso_target} days`, badge: dsoLabel, badgeClass: dsoBadge },
    { label: 'Total AR',   value: fmtE(d.total_ar),
      sub: `${d.invoice_count} open invoices` },
    { label: 'Overdue >30d', value: fmtE(d.overdue_30),
      sub: 'Requires follow-up',
      badge: d.overdue_30 > 0 ? 'OVERDUE' : null,
      badgeClass: 'badge-warn' },
    { label: 'Overdue >60d', value: fmtE(d.overdue_60),
      sub: 'Formal notice required',
      badge: d.overdue_60 > 0 ? 'ESCALATE' : null,
      badgeClass: 'badge-urgent' },
    { label: 'Overdue >90d', value: fmtE(d.overdue_90),
      sub: 'Collections stage',
      badge: d.overdue_90 > 0 ? 'CRITICAL' : null,
      badgeClass: 'badge-urgent' },
  ];

  document.getElementById('kpi-grid').innerHTML = items.map(k => `
    <div class="kpi">
      ${k.badge ? `<span class="kpi-badge ${k.badgeClass}">${k.badge}</span>` : ''}
      <div class="kpi-label">${k.label}</div>
      <div class="kpi-value">${k.value}</div>
      <div class="kpi-sub">${k.sub}</div>
    </div>
  `).join('');
}

function renderAgingBars(d) {
  const total  = Object.values(d.aging).reduce((a,b)=>a+b,0) || 1;
  const order  = ['Current','1-30 days','31-60 days','61-90 days','>90 days'];
  document.getElementById('aging-bars').innerHTML = order.map(b => {
    const amt = d.aging[b] || 0;
    const pct = (amt/total*100).toFixed(1);
    return `
      <div class="aging-row">
        <span class="aging-label">${b}</span>
        <div class="aging-bar-wrap">
          <div class="aging-bar" style="width:${pct}%;background:${AGING_COLORS[b]}"></div>
        </div>
        <span class="aging-amount">${fmtE(amt)}</span>
        <span class="aging-pct">${pct}%</span>
      </div>`;
  }).join('');
}

function renderDSOChart(d) {
  const hist   = d.history.slice(-60);
  const labels = hist.map(h => {
    const dt = new Date(h.date);
    return dt.toLocaleDateString('nl-NL',{month:'short',day:'numeric'});
  });

  new Chart(document.getElementById('dsoChart'), {
    type: 'line',
    data: {
      labels,
      datasets: [
        { label: 'DSO (days)', data: hist.map(h=>h.dso),
          borderColor: '#1a1916', backgroundColor: 'rgba(26,25,22,0.06)',
          borderWidth: 2, pointRadius: 3, pointBackgroundColor: '#1a1916',
          fill: true, tension: 0.3 },
        { label: 'Target', data: hist.map(h=>h.target),
          borderColor: '#dc2626', borderWidth: 1.5,
          borderDash: [6,4], pointRadius: 0, fill: false },
      ]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: { legend: { labels: { font: { family: 'IBM Plex Mono', size: 11 }, boxWidth: 12 }}},
      scales: {
        x: { grid: { display: false },
             ticks: { font: { family: 'IBM Plex Mono', size: 10 }, maxTicksLimit: 8 }},
        y: { grid: { color: '#e2e0d9' },
             ticks: { font: { family: 'IBM Plex Mono', size: 10 }}}
      }
    }
  });
}

function renderCustomerChart(d) {
  const top = d.overdue_top.slice(0,8);
  new Chart(document.getElementById('customerChart'), {
    type: 'bar',
    data: {
      labels: top.map(i => i.company.length > 22 ? i.company.slice(0,20)+'…' : i.company),
      datasets:[{
        label: 'Overdue (€)',
        data: top.map(i => i.amount),
        backgroundColor: top.map(i =>
          i.level==='URGENT' ? '#fee2e2' :
          i.level==='High'   ? '#ffedd5' : '#fef9c3'),
        borderColor: top.map(i =>
          i.level==='URGENT' ? '#dc2626' :
          i.level==='High'   ? '#ea580c' : '#d97706'),
        borderWidth: 1.5, borderRadius: 2,
      }]
    },
    options: {
      indexAxis: 'y',
      responsive: true, maintainAspectRatio: false,
      plugins: { legend: { display: false } },
      scales: {
        x: { grid: { color: '#e2e0d9' },
             ticks: { font: { family:'IBM Plex Mono', size:10 },
                      callback: v => '€'+fmt(v) }},
        y: { grid: { display: false },
             ticks: { font: { family:'IBM Plex Sans', size:11 }}}
      }
    }
  });
}

function renderPriorityChart(d) {
  const counts = { URGENT:0, High:0, Monitor:0 };
  d.invoices.forEach(i => { if(i.days_overdue>0) counts[i.level]++; });

  new Chart(document.getElementById('priorityChart'), {
    type: 'doughnut',
    data: {
      labels: ['URGENT','High','Monitor'],
      datasets:[{
        data: [counts.URGENT, counts.High, counts.Monitor],
        backgroundColor: ['#dc2626','#ea580c','#d97706'],
        borderColor: '#ffffff', borderWidth: 3,
      }]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      cutout: '65%',
      plugins: {
        legend: { position:'bottom',
          labels: { font:{family:'IBM Plex Mono',size:11}, padding:16, boxWidth:12 }}
      }
    }
  });
}

function renderTable(d) {
  const rows = d.overdue_top;
  document.getElementById('overdue-count').textContent = rows.length + ' invoices';

  function daysClass(n) {
    if (n <= 0)  return 'days-0';
    if (n <= 30) return 'days-30';
    if (n <= 60) return 'days-60';
    return 'days-90';
  }
  function levelPill(l) {
    const cls = l==='URGENT'?'pill-urgent': l==='High'?'pill-high':'pill-ok';
    return `<span class="pill ${cls}">${l}</span>`;
  }

  document.getElementById('overdue-tbody').innerHTML = rows.map((inv,i) => `
    <tr>
      <td class="mono" style="color:var(--muted)">${i+1}</td>
      <td><strong>${inv.company}</strong></td>
      <td class="mono">${inv.invoice_no}</td>
      <td class="mono">${inv.due_date}</td>
      <td class="amount">${fmtE(inv.amount)}</td>
      <td><span class="days-chip ${daysClass(inv.days_overdue)}">${inv.days_overdue}d</span></td>
      <td>${levelPill(inv.level)}</td>
    </tr>
  `).join('');
}

load();
</script>
</body>
</html>
